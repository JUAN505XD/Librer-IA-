<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Preferencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #667eea, #764ba2); min-height:100vh; display:flex; align-items:center; justify-content:center;">

<div class="card p-4" style="width:500px; border-radius:15px;">

    <h3 class="text-center mb-4">Preferencias (Opcional)</h3>

    <form method="post">
        {% csrf_token %}

        <h5>Géneros</h5>
<div class="mb-3">
    {{ form.generos }}
</div>

<h5 class="mt-3">Autores</h5>
<div class="mb-3">
    {{ form.autores }}
</div>

        <button type="submit" class="btn btn-success w-100 mb-2">
            Guardar
        </button>

        <button type="submit" name="saltar" class="btn btn-secondary w-100">
            Saltar
        </button>
    </form>

</div>

</body>
</html>
