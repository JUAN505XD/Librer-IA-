{% extends "base.html" %}
{% load static %}

{% block content %}

<style>
.login-container {
    background: white;
    border-radius: 15px;
    max-width: 500px;
    margin: 60px auto;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-header {
    background: #87CEEB;
    color: white;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
    margin-bottom: 30px;
}

.seccion {
    margin-bottom: 20px;
}

.seccion h4 {
    margin-bottom: 10px;
    color: #004080;
    border-bottom: 2px solid #87CEEB;
    padding-bottom: 5px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.btn-login {
    background: #0066cc;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    width: 100%;
    font-weight: bold;
}

.btn-login:hover {
    background: #0055aa;
}
</style>

<div class="login-container">

    <div class="login-header">
        <h2>Iniciar Sesión</h2>
        <p>Accede a tu cuenta</p>
    </div>

    <form method="post">
        {% csrf_token %}

        <!-- 🔵 DATOS DE ACCESO -->
        <div class="seccion">
            <h4>Datos de Acceso</h4>

            <div style="margin-bottom:15px;">
                <label>Usuario</label>
                {{ form.username }}
            </div>

            <div>
                <label>Contraseña</label>
                {{ form.password }}
            </div>
        </div>

        <!-- BOTÓN -->
        <button type="submit" class="btn-login">
            Ingresar
        </button>

        <p style="text-align:center; margin-top:15px;">
         ¿No tienes cuenta? 
        <a href="{% url 'registro' %}">Regístrate</a>
        </p>

    </form>

</div>

{% endblock %}
