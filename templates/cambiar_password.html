<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cambiar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #667eea, #764ba2); min-height:100vh; display:flex; align-items:center; justify-content:center;">

<div class="card p-4" style="width:500px; border-radius:15px;">

    <h3 class="text-center mb-4">Cambiar Contraseña</h3>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-success w-100 mb-2">
            Guardar contraseña
        </button>

        <a href="{% url 'inicio' %}" class="btn btn-secondary w-100">
            Cancelar
        </a>
    </form>

</div>

</body>
</html>
