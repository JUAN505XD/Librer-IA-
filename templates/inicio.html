<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Librería</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .inicio-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .btn-custom {
            border-radius: 25px;
            padding: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .btn-login {
            background: #4CAF50;
            color: white;
        }

        .btn-register {
            background: #007bff;
            color: white;
        }

        .btn-logout {
            background: #dc3545;
            color: white;
        }

        .btn-login:hover,
        .btn-register:hover,
        .btn-logout:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="inicio-container">

    {% if user.is_authenticated %}

        <h2 class="mb-3">Bienvenido {{ user.username }} 👋</h2>
        <p class="mb-4">Ya estás dentro del sistema</p>

        <a href="{% url 'logout' %}" class="btn btn-logout btn-custom w-100">
            Cerrar sesión
        </a>

    {% else %}

        <h2 class="mb-3">Bienvenido 📚</h2>
        <p class="mb-4">Sistema de Librería</p>

        <a href="{% url 'login' %}" class="btn btn-login btn-custom w-100">
            Iniciar Sesión
        </a>

        <a href="{% url 'registro' %}" class="btn btn-register btn-custom w-100">
            Registrarse
        </a>

    {% endif %}

</div>

</body>
</html>
